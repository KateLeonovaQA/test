<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🐍 Snake Game</title>
    <link rel="stylesheet" href="snake.css" />
<script src="https://sites.super.gammamyninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<div class="game-wrapper">

    <!-- Header -->
    <div class="game-header">
        <div class="game-title">🐍 Snake</div>
        <div class="score-panel">
            <div class="score-box">
                <div class="score-label">Score</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">Best</div>
                <div class="score-value" id="highScore">0</div>
            </div>
        </div>
    </div>

    <!-- Level Badge -->
    <div class="level-badge">
        <div class="level-dot"></div>
        Level: <strong id="levelLabel">Easy</strong>
    </div>

    <!-- Game Canvas -->
    <div class="canvas-container">
        <canvas id="gameCanvas"></canvas>

        <!-- Start Overlay -->
        <div class="overlay" id="startOverlay">
            <div class="overlay-icon">🐍</div>
            <div class="overlay-title green">Snake</div>
            <div class="overlay-subtitle">Use arrow keys or WASD to move</div>
            <div class="overlay-subtitle">Eat 🔴 food to grow &nbsp;|&nbsp; Catch ⭐ bonus for +50pts</div>
            <button class="btn btn-primary" onclick="startGame()">▶ &nbsp; Start Game</button>
        </div>

        <!-- Game Over Overlay -->
        <div class="overlay hidden" id="gameOverOverlay">
            <div class="overlay-icon">💀</div>
            <div class="overlay-title red">Game Over</div>
            <div class="overlay-score">
                Score: <span id="finalScore">0</span>
            </div>
            <div class="overlay-score">
                Best: <span id="finalBest">0</span>
            </div>
            <button class="btn btn-primary" onclick="startGame()">↺ &nbsp; Play Again</button>
        </div>
    </div>

    <!-- Keyboard Controls Info -->
    <div class="controls-info">
        <div class="control-item">
            <span class="key">↑ ↓ ← →</span> Move
        </div>
        <div class="control-item">
            <span class="key">WASD</span> Move
        </div>
        <div class="control-item">
            <span class="key">P</span> Pause
        </div>
        <div class="control-item">
            <span class="key">ESC</span> Pause
        </div>
    </div>

    <!-- Mobile Touch Controls -->
    <div class="touch-controls">
        <div class="touch-row">
            <div class="touch-btn" data-dir="ArrowUp">⬆️</div>
        </div>
        <div class="touch-row">
            <div class="touch-btn" data-dir="ArrowLeft">⬅️</div>
            <div class="touch-btn" data-dir="ArrowDown">⬇️</div>
            <div class="touch-btn" data-dir="ArrowRight">➡️</div>
        </div>
    </div>

</div>

<script src="snake.js"></script>
</body>
</html>
